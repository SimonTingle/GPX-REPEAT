version: '3.8'

services:
  gpx-repeat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpx-repeat
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - gpx-network

networks:
  gpx-network:
    driver: bridge
